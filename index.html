<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>包材庫存管理</title>
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="包材庫存">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div>
        <h1>包材庫存管理</h1>
        <p>使用 Firebase Firestore 即時同步手機、電腦與多人庫存資料。</p>
      </div>
      <button class="primary-button" id="addItemButton" type="button">新增包材</button>
    </header>

    <section class="toolbar" aria-label="庫存工具列">
      <label class="search-field" for="searchInput">
        <span>搜尋包材名稱</span>
        <input id="searchInput" type="search" placeholder="輸入名稱，例如 S 箱">
      </label>
      <div class="notification-tools">
        <button class="secondary-button" id="enableNotificationsButton" type="button">開啟庫存通知</button>
        <span class="notice-status" id="notificationStatus" role="status"></span>
      </div>
      <span class="notice-status sync-status" id="syncStatus" role="status">正在連線 Firebase...</span>
    </section>

    <section class="table-wrap" aria-label="包材庫存列表">
      <table>
        <thead>
          <tr>
            <th>包材名稱</th>
            <th>現有庫存</th>
            <th>最低庫存</th>
            <th>累計取用量</th>
            <th>建議叫貨數量</th>
            <th>狀態</th>
            <th>取用數量</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="inventoryTableBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState" hidden>目前沒有包材，請先新增包材。</div>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
